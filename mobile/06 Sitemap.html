<body>

<div id="root"></div>
<script src="_shared.js"></script>
<script>window.__mockupToolbar('Sitemap + Motion');</script>

<script type="text/babel" data-presets="react">
const Canvas = window.DesignCanvas;
const Section = window.DCSection;
const Artboard = window.DCArtboard;

function App() {
  return (
    <Canvas>
      <Section id="motion" title="Motion design" subtitle="Timings, easings, hero moments · live demos">
        <Artboard id="motion-spec" label="56 · Motion spec" sublabel="Engineering handoff" width={1400} height={1500}>
          <AnimationSpecs/>
        </Artboard>
      </Section>

      <Section id="sitemap" title="Sitemap" subtitle="All 47 screens at a glance · cross-persona handoffs in dashed lines">
        <Artboard id="sitemap-full" label="48 · IA diagram" sublabel="Full product surface" width={1800} height={1100}>
          <Sitemap/>
        </Artboard>
      </Section>
    </Canvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
