<!DOCTYPE html>

<body>

<script type="text/babel" data-presets="react">
const Canvas = window.DesignCanvas;
const Section = window.DCSection;
const Artboard = window.DCArtboard;

function App() {
  return (
    <Canvas>
      <Section id="cust-book" title="Customer · Book a visit (PWA)" subtitle="No download · text-link entry · mobile web">
        <Artboard id="c-land" label="28 · Landing" sublabel="From SMS · describe issue" width={324} height={684}><IPhone w={324} h={684}><C_Landing/></IPhone></Artboard>
        <Artboard id="c-time" label="29 · Pick window" sublabel="Same-day slots" width={324} height={684}><IPhone w={324} h={684}><C_PickTime/></IPhone></Artboard>
        <Artboard id="c-conf" label="30 · Confirm" sublabel="Address + phone" width={324} height={684}><IPhone w={324} h={684}><C_Confirm/></IPhone></Artboard>
        <Artboard id="c-booked" label="31 · Booked" sublabel="Tech assigned" width={324} height={684}><IPhone w={324} h={684}><C_Booked/></IPhone></Artboard>
      </Section>

      <Section id="cust-day" title="Customer · Day-of" subtitle="Tracking → estimate → pay → review">

        <Artboard id="c-rcpt" label="36 · Receipt + review" sublabel="Rate Jose · save warranty" width={324} height={684}><IPhone w={324} h={684}><C_Receipt/></IPhone></Artboard>
      </Section>
    </Canvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
