<body>

<div id="root"></div>
<script src="_shared.js"></script>

<script type="text/babel" data-presets="react">
const Canvas = window.DesignCanvas;

      </Section>

      <Section id="tech-job" title="Tech · On-site flow" subtitle="The job from arrival to payment">
